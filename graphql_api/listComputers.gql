query listComputers($pageSize: Int, $nextToken: String, $direction: OrderDirection!, $field: [ComputerOrderField!], $filter: ComputerFiltersInput, $isList: Boolean = true, $RBAC_ThreatPreventionVersion: Boolean!, $RBAC_Plan: Boolean!, $RBAC_Insight: Boolean!) {
  listComputers(
    input: {next: $nextToken, order: {direction: $direction, field: $field}, pageSize: $pageSize, filter: $filter}
  ) {
    items {
      ...ComputerFields
      __typename
    }
    pageInfo {
      next
      total
      __typename
    }
    __typename
  }
}

fragment ComputerFields on Computer {
  uuid
  serial
  hostName
  modelName
  osMajor
  osMinor
  osPatch
  arch @skip(if: $isList)
  certid @skip(if: $isList)
  memorySize @skip(if: $isList)
  osString
  kernelVersion @skip(if: $isList)
  installType @skip(if: $isList)
  label @skip(if: $isList)
  created
  updated
  version
  checkin
  configHash
  tags
  label
  signaturesVersion @include(if: $RBAC_ThreatPreventionVersion)
  plan @include(if: $RBAC_Plan) {
    id
    name
    hash
    __typename
  }
  insightsStatsFail @include(if: $RBAC_Insight)
  insightsUpdated @include(if: $RBAC_Insight)
  connectionStatus
  lastConnection
  lastConnectionIp
  lastDisconnection
  lastDisconnectionReason
  webProtectionActive
  fullDiskAccess
  pendingPlan
  __typename
}
