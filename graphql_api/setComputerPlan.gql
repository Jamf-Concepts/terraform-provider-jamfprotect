mutation setComputerPlan($uuid: ID!, $plan: ID!, $isList: Boolean = false, $RBAC_ThreatPreventionVersion: Boolean!, $RBAC_Plan: Boolean!, $RBAC_Insight: Boolean!) {
  setComputerPlan(uuid: $uuid, input: {plan: $plan}) {
    ...ComputerFields
    __typename
  }
}

fragment ComputerFields on Computer {
  uuid
  serial
  hostName
  modelName
  osMajor
  osMinor
  osPatch
  arch @skip(if: $isList)
  certid @skip(if: $isList)
  memorySize @skip(if: $isList)
  osString
  kernelVersion @skip(if: $isList)
  installType @skip(if: $isList)
  label @skip(if: $isList)
  created
  updated
  version
  checkin
  configHash
  tags
  label
  signaturesVersion @include(if: $RBAC_ThreatPreventionVersion)
  plan @include(if: $RBAC_Plan) {
    id
    name
    hash
    __typename
  }
  insightsStatsFail @include(if: $RBAC_Insight)
  insightsUpdated @include(if: $RBAC_Insight)
  connectionStatus
  lastConnection
  lastConnectionIp
  lastDisconnection
  lastDisconnectionReason
  webProtectionActive
  fullDiskAccess
  pendingPlan
  __typename
}
