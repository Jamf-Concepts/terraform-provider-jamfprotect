[tools]
go = "latest"
prek = "latest"
"aqua:terraform" = "latest"

# ── Dependency tasks ─────────────────────────────────────────────────────────

[tasks.install]
description = "Install Go module dependencies"
run = "go mod download"

[tasks.tidy]
description = "Tidy Go module dependencies"
run = "go mod tidy"

# ── Build tasks ──────────────────────────────────────────────────────────────

[tasks."build:provider"]
description = "Build the provider"
run = "go build -v ./..."
depends = ["install"]

[tasks."build:generate-docs"]
description = "Generate provider documentation with tfplugindocs"
dir = "tools"
run = "go generate ./..."

[tasks.build]
description = "Build the provider and generate documentation"
depends = ["build:provider", "build:generate-docs"]

# ── Development tasks ────────────────────────────────────────────────────────

[tasks."dev:build"]
description = "Build the provider binary into the project root"
run = "go build -o terraform-provider-jamfprotect"

# dev:sandbox is a file task at .mise-tasks/dev/sandbox

[tasks.dev]
description = "Build the provider and set up the sandbox environment"
depends = ["dev:build", "dev:sandbox"]

[tasks.fmt]
description = "Format Go source files"
run = "gofmt -s -w -e ."

[tasks.lint]
description = "Run golangci-lint"
run = "golangci-lint run"

# ── Test tasks ───────────────────────────────────────────────────────────────

[tasks.test]
description = "Run unit tests"
run = "go test -v -cover -timeout=120s -parallel=10 ./..."

[tasks.testacc]
description = "Run acceptance tests (requires Jamf Protect credentials via fnox)"
run = "go test -v -cover -timeout 120m ./..."
env = { TF_ACC = "1" }

# ── Composite tasks ─────────────────────────────────────────────────────────

[tasks.check]
description = "Run fmt, lint, and unit tests"
depends = ["fmt", "lint", "test"]
