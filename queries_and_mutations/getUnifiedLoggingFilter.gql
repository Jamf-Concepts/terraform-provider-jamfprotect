query getUnifiedLoggingFilter($uuid: ID!) {
  getUnifiedLoggingFilter(uuid: $uuid) {
    ...UnifiedLoggingFilterFields
    __typename
  }
}

fragment UnifiedLoggingFilterFields on UnifiedLoggingFilter {
  uuid
  name
  description
  created
  updated
  filter
  tags
  enabled
  level
  __typename
}
