query listActionConfigs($nextToken: String, $direction: OrderDirection!, $field: ActionConfigsOrderField!) {
  listActionConfigs(
    input: {next: $nextToken, order: {direction: $direction, field: $field}, pageSize: 100}
  ) {
    items {
      id
      name
      description
      created
      updated
      __typename
    }
    pageInfo {
      next
      total
      __typename
    }
    __typename
  }
}
