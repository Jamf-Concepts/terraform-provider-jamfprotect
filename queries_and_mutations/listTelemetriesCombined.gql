query listTelemetriesCombined($field: TelemetryOrderField!, $direction: OrderDirection!, $RBAC_Plan: Boolean!) {
  listTelemetries(
    input: {order: {direction: $direction, field: $field}, pageSize: 100}
  ) {
    items {
      ...TelemetryFields
      __typename
    }
    pageInfo {
      next
      total
      __typename
    }
    __typename
  }
  listTelemetriesV2(
    input: {order: {direction: $direction, field: $field}, pageSize: 100}
  ) {
    items {
      id
      name
      description
      plans @include(if: $RBAC_Plan) {
        id
        name
        __typename
      }
      created
      updated
      __typename
    }
    pageInfo {
      next
      total
      __typename
    }
    __typename
  }
}

fragment TelemetryFields on Telemetry {
  id
  name
  description
  verbose
  level
  created
  updated
  plans @include(if: $RBAC_Plan) {
    id
    name
    __typename
  }
  performanceMetrics
  logFiles
  logFileCollection
  __typename
}
