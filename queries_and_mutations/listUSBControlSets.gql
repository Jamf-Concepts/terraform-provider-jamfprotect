query listUSBControlSets($nextToken: String, $direction: OrderDirection!, $field: USBControlOrderField!) {
  listUSBControlSets(
    input: {next: $nextToken, order: {direction: $direction, field: $field}, pageSize: 100}
  ) {
    items {
      ...USBControlSetFields
      __typename
    }
    pageInfo {
      next
      total
      __typename
    }
    __typename
  }
}

fragment USBControlSetFields on USBControlSet {
  id
  name
  description
  defaultMountAction
  defaultMessageAction
  rules {
    mountAction
    messageAction
    type
    ... on VendorRule {
      vendors
      applyTo
      __typename
    }
    ... on SerialRule {
      serials
      applyTo
      __typename
    }
    ... on ProductRule {
      products {
        vendor
        product
        __typename
      }
      applyTo
      __typename
    }
    __typename
  }
  plans {
    id
    name
    __typename
  }
  created
  updated
  __typename
}
