query listUnifiedLoggingFilters(
  $nextToken: String
  $direction: OrderDirection!
  $field: UnifiedLoggingFiltersOrderField!
  $filter: UnifiedLoggingFiltersFilterInput!
) {
  listUnifiedLoggingFilters(
    input: {
      next: $nextToken
      order: { direction: $direction, field: $field }
      pageSize: 100
      filter: $filter
    }
  ) {
    items {
      ...UnifiedLoggingFilterFields
      __typename
    }
    pageInfo {
      next
      total
      __typename
    }
    __typename
  }
}

fragment UnifiedLoggingFilterFields on UnifiedLoggingFilter {
  uuid
  name
  description
  created
  updated
  filter
  tags
  enabled
  level
  __typename
}
