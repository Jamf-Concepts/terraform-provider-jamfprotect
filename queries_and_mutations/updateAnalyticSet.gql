mutation updateAnalyticSet($uuid: ID!, $name: String!, $description: String, $types: [ANALYTIC_SET_TYPE!], $analytics: [ID!]!, $RBAC_Plan: Boolean!, $excludeAnalytics: Boolean = false) {
  updateAnalyticSet(
    uuid: $uuid
    input: {name: $name, description: $description, analytics: $analytics, types: $types}
  ) {
    ...AnalyticSetFields
    __typename
  }
}

fragment AnalyticSetFields on AnalyticSet {
  uuid
  name
  description
  analytics @skip(if: $excludeAnalytics) {
    uuid
    name
    jamf
    __typename
  }
  plans @include(if: $RBAC_Plan) {
    id
    name
    __typename
  }
  created
  updated
  managed
  types
  __typename
}
